name: Build Arduino MetaAI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package MetaAI plugin
        run: |
          mkdir -p dist
          zip -r dist/arduino-metaai-plugin.zip src README.md
      - uses: actions/upload-artifact@v4
        with:
          name: Arduino-MetaAI-Plugin
          path: dist/arduino-metaai-plugin.zip
